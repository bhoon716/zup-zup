# Include this file from the host Nginx http context.
# The rates are deliberately conservative for a single OCI host.
limit_req_zone $binary_remote_addr zone=sugang_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=sugang_notification:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=sugang_crawler:10m rate=2r/m;
