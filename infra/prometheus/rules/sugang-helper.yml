groups:
  - name: sugang-helper-slo
    rules:
      - alert: NotificationFirstAttemptSlaBreached
        expr: histogram_quantile(0.95, sum by (le) (rate(notification_outbox_claim_to_attempt_seconds_bucket[5m]))) > 5
        for: 2m
        labels:
          service: notification
          severity: warning
        annotations:
          summary: Notification first-attempt SLA is breached
          description: The 95th percentile claim-to-first-attempt latency exceeded five seconds.

      - alert: NotificationDeliveryDlqGrowing
        expr: increase(notification_outbox_dlq_total[10m]) > 0
        for: 2m
        labels:
          service: notification
          severity: critical
        annotations:
          summary: Notification delivery entered the DLQ
          description: One or more deliveries moved to the notification DLQ in the last ten minutes.

      - alert: CrawlerDataStale
        expr: crawler_data_stale > 0
        for: 2m
        labels:
          service: crawler
          severity: warning
        annotations:
          summary: Crawler data is stale
          description: The latest course crawl is older than the configured freshness threshold.

      - alert: NotificationProviderCircuitOpen
        expr: increase(notification_provider_circuit_open_total[10m]) > 0
        for: 2m
        labels:
          service: notification
          severity: critical
        annotations:
          summary: Notification provider circuit opened
          description: A notification provider circuit breaker rejected delivery attempts.
