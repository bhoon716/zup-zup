global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "sugang-helper"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["app:8081"]
