# Local development defaults. Production CD transfers only docker-compose.yml.

services:
  db:
    volumes: !override
      - local_db_data:/var/lib/mysql

  redis:
    volumes: !override
      - local_redis_data:/data

  app:
    build:
      dockerfile: Dockerfile.local
    environment:
      LOG_FILE: /tmp/application.log
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
      APP_CORS_REQUIRE_HTTPS: "false"
      APP_AUTH_REFRESH_COOKIE_SECURE: "false"
    volumes: !override
      - ${APP_PROD_CONFIG_PATH:-../apps/server/src/main/resources/application-prod.yml}:/app/config/application-prod.yml:ro
      - ${FIREBASE_CONFIG_PATH:?FIREBASE_CONFIG_PATH must be set}:/app/config/firebase-key.json:ro
      - local_app_uploads:/app/data/uploads

  grafana:
    networks: !override
      - sugang-helper-runtime
      - sugang-helper-egress

volumes:
  local_db_data:
    name: sugang-helper-local-db-data
    external: true
  local_app_uploads:
    name: sugang-helper-local-app-uploads
    external: true
  local_redis_data:
    name: sugang-helper-local-redis-data
    external: true

networks:
  sugang-helper-runtime: !override
    name: sugang-helper-runtime
    external: true
