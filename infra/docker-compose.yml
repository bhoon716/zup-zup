services:
  db:
    image: ${DB_IMAGE}
    container_name: ${DB_CONTAINER_NAME}
    restart: unless-stopped
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-expire-logs-seconds=604800
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      DB_RUNTIME_USER: ${DB_RUNTIME_USER}
      DB_RUNTIME_PASSWORD: ${DB_RUNTIME_PASSWORD}
      DB_MIGRATOR_USER: ${DB_MIGRATOR_USER}
      DB_MIGRATOR_PASSWORD: ${DB_MIGRATOR_PASSWORD}
      DB_BACKUP_USER: ${DB_BACKUP_USER}
      DB_BACKUP_PASSWORD: ${DB_BACKUP_PASSWORD}
      TZ: ${TZ}
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init/01-provision-service-accounts.sh:/docker-entrypoint-initdb.d/01-provision-service-accounts.sh:ro
    networks:
      - sugang-helper-network-server
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysql --protocol=socket -h localhost -uroot -e 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE}
    container_name: ${REDIS_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec
    volumes:
      - /var/lib/jbnu-sugang-helper/redis:/data
    networks:
      - sugang-helper-network-server
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep -qx PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  prometheus:
    image: prom/prometheus@sha256:0e698e35e50d1ddc2d11a4a55b089fe62eb71358a5c204dfafd21bdf8ffe04b8
    container_name: ${PROMETHEUS_CONTAINER_NAME}
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    environment:
      TZ: ${TZ}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - sugang-helper-management
      - sugang-helper-observability

  grafana:
    image: grafana/grafana@sha256:6ea068891652aa6a65ca9065c26b89de939653803c836426970305c11fd00534
    container_name: ${GRAFANA_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - TZ=${TZ}
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - /var/lib/jbnu-sugang-helper/grafana:/var/lib/grafana
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - sugang-helper-network-server
      - sugang-helper-observability

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager@sha256:99a885f56ca2203a2eb352a5f9e2cd5c1e25786508debd725ad48ebe955d114f
    container_name: sugang-helper-nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "127.0.0.1:81:81"
      - "443:443"
    volumes:
      - ./nginx-proxy-manager/data:/data
      - ./nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    environment:
      TZ: ${TZ}
    networks:
      - sugang-helper-network-server

  loki:
    image: grafana/loki@sha256:d14b3a2c419b72fe27cd094c017863bd37a5ea9ac7d72f35bcd25f5bd081dc47
    container_name: sugang-helper-loki
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - /var/lib/jbnu-sugang-helper/loki:/var/lib/loki
    command: -config.file=/etc/loki/local-config.yaml
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - sugang-helper-network-server

  promtail:
    image: grafana/promtail@sha256:238d8562dc29ec83d2f5933c7fd6e9469a90ea316a04f160dcc7cf842910ca94
    container_name: sugang-helper-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/jbnu-sugang-helper/promtail:/var/lib/promtail
      - ./promtail/promtail-config.yaml:/etc/promtail/docker-config.yaml:ro
    command: -config.file=/etc/promtail/docker-config.yaml
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - sugang-helper-network-server

  app:
    image: ${APP_IMAGE_NAME:-sugang-helper-app}:${APP_IMAGE_TAG:-latest}
    container_name: ${APP_CONTAINER_NAME}
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777
    env_file:
      - ${APP_RELEASE_DIR:-../apps/server}/.env
    environment:
      SPRING_DATASOURCE_URL: ${DB_JDBC_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_RUNTIME_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_RUNTIME_PASSWORD}
      SPRING_FLYWAY_ENABLED: "false"
    ports:
      - "${APP_PORT_HOST}:${APP_PORT_CONTAINER}"
    volumes:
      - ${APP_RELEASE_DIR:-../apps/server}/src/main/resources/application-prod.yml:/app/config/application-prod.yml:ro
      - ${FIREBASE_CONFIG_PATH}:/app/config/firebase-key.json:ro
      - /var/log/jbnu-sugang-helper/server:/var/log/jbnu-sugang-helper/server
      - /var/lib/jbnu-sugang-helper/uploads:/app/data/uploads
    extra_hosts:
      - "oasis.jbnu.ac.kr:114.70.191.85"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8081/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - sugang-helper-network-server
      - sugang-helper-management
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    image: flyway/flyway@sha256:8ace7d9825bb3ad1d6e14ee27b3a830b638ac841ba424b99b2d92aa65a99d484
    restart: "no"
    profiles: ["migration"]
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777
    environment:
      FLYWAY_URL: ${DB_JDBC_URL}
      FLYWAY_USER: ${DB_MIGRATOR_USER}
      FLYWAY_PASSWORD: ${DB_MIGRATOR_PASSWORD}
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_BASELINE_VERSION: "3"
      FLYWAY_CLEAN_DISABLED: "true"
      FLYWAY_CONNECT_RETRIES: "60"
    command: migrate
    volumes:
      - ${APP_RELEASE_DIR:-../apps/server}/src/main/resources/db/migration:/flyway/sql:ro
    networks:
      - sugang-helper-network-server
    depends_on:
      db:
        condition: service_healthy

networks:
  sugang-helper-network-server:
    name: sugang-helper-network-server
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 9000
  sugang-helper-management:
    name: sugang-helper-management
    internal: true
  sugang-helper-observability:
    name: sugang-helper-observability
    internal: true

volumes:
  db_data:
    name: sugang-helper-db-data
