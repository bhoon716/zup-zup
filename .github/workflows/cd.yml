name: CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      server: ${{ steps.filter.outputs.server }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 변경 경로 탐지
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - '.github/workflows/**'
            server:
              - 'apps/server/**'
              - 'packages/shared/**'
              - '.github/workflows/**'
            infra:
              - 'infra/**'
              - '.github/workflows/**'

  verify-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: 의존성 설치
        working-directory: apps/web
        run: npm ci

      - name: 웹 테스트 실행
        working-directory: apps/web
        run: npm test -- --run

      - name: 웹 린트 실행
        working-directory: apps/web
        run: npm run lint

      - name: 웹 빌드 실행
        working-directory: apps/web
        run: npm run build

  verify-server:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: JDK 21 설정
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle
          cache-dependency-path: apps/server/build.gradle

      - name: 서버 테스트 및 검사 실행
        working-directory: apps/server
        run: ./gradlew clean check --no-daemon

  deploy-server:
    needs:
      - changes
      - verify-server
    if: needs.changes.outputs.server == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: JDK 21 설정
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle
          cache-dependency-path: apps/server/build.gradle

      - name: JAR 빌드
        working-directory: apps/server
        run: ./gradlew clean bootJar --no-daemon

      - name: 서버 파일 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "apps/server/build/libs/app.jar,apps/server/src/main/resources/application-prod.yml,apps/server/Dockerfile,apps/server/.dockerignore"
          target: "~/jbnu-sugang-helper/apps/server/"

      - name: 서버에서 이미지 빌드 및 재배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/jbnu-sugang-helper/apps/server
            docker build -t sugang-helper-app:latest .
            cd ~/jbnu-sugang-helper/infra
            docker compose up -d --no-deps app

  verify-infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: 인프라 정책 검증
        working-directory: infra
        run: bash scripts/verify-compose-policy.sh docker-compose.yml
