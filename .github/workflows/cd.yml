name: Production CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "배포할 40자리 commit SHA (수동 배포 시 필수)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: deploy to OCI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/jbnu-sugang-helper/server
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: 수동 배포 SHA 입력 확인
        if: github.event_name == 'workflow_dispatch'
        env:
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          if [ -z "${IMAGE_TAG_INPUT}" ]; then
            echo "image_tag is required for manual deployment" >&2
            exit 1
          fi

      - name: 코드 체크아웃
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.image_tag || github.sha }}

      - name: JDK 21 설정
        if: github.event_name == 'push'
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle
          cache-dependency-path: apps/server/gradle/wrapper/gradle-wrapper.properties

      - name: 애플리케이션 JAR 빌드
        if: github.event_name == 'push'
        working-directory: apps/server
        run: ./gradlew bootJar --no-daemon

      - name: GHCR 로그인
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: QEMU 설정
        if: github.event_name == 'push'
        uses: docker/setup-qemu-action@v3

      - name: Buildx 설정
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: ARM64 이미지 build/push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: apps/server
          file: apps/server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          labels: org.opencontainers.image.revision=${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: release SHA·서버 설정 확인
        run: |
          if [[ ! "${IMAGE_TAG}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "IMAGE_TAG must be exactly 40 lowercase hexadecimal characters" >&2
            exit 1
          fi
          for variable in SERVER_HOST SERVER_USER; do
            if [ -z "${!variable}" ]; then
              echo "Missing server setting: ${variable}" >&2
              exit 1
            fi
          done
          if [[ ! "${SERVER_USER}" =~ ^[a-z_][a-z0-9_-]*\$?$ ]]; then
            echo "SERVER_USER contains unsupported characters" >&2
            exit 1
          fi
          if [ "${SERVER_USER}" != "ubuntu" ]; then
            echo "SERVER_USER must be ubuntu for the direct SSH deploy contract" >&2
            exit 1
          fi

      - name: SSH 키 설정
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "Missing repository secret: SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          install -d -m 700 "${HOME}/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" >"${HOME}/.ssh/id_ed25519"
          ssh-keyscan -T 10 -t ed25519 "${SERVER_HOST}" >"${HOME}/.ssh/known_hosts" 2>/dev/null
          if [ ! -s "${HOME}/.ssh/known_hosts" ]; then
            echo "Unable to collect SSH host key from ${SERVER_HOST}" >&2
            exit 1
          fi
          chmod 600 "${HOME}/.ssh/id_ed25519" "${HOME}/.ssh/known_hosts"

      - name: release staging 준비
        id: stage
        env:
          SERVER_DOTENV: ${{ secrets.SERVER_DOTENV }}
        run: |
          if [ -z "${SERVER_DOTENV}" ]; then
            echo "Missing repository secret: SERVER_DOTENV" >&2
            exit 1
          fi
          stage_dir="${RUNNER_TEMP}/jbnu-release-${IMAGE_TAG}"
          mkdir -p "${stage_dir}/apps/server" \
            "${stage_dir}/src/main/resources/db/migration" \
            "${stage_dir}/mysql/init"
          cp infra/docker-compose.yml "${stage_dir}/docker-compose.yml"
          cp -a infra/loki "${stage_dir}/loki"
          cp -a infra/alloy "${stage_dir}/alloy"
          cp -a infra/prometheus "${stage_dir}/prometheus"
          cp -a infra/grafana "${stage_dir}/grafana"
          cp infra/mysql/init/01-provision-service-accounts.sh \
            "${stage_dir}/mysql/init/01-provision-service-accounts.sh"
          cp apps/server/src/main/resources/application-prod.yml \
            "${stage_dir}/application-prod.yml"
          cp apps/server/src/main/resources/db/migration/V*__*.sql \
            "${stage_dir}/src/main/resources/db/migration/"
          cp infra/scripts/deploy-release.sh "${stage_dir}/deploy.sh"
          umask 077
          printf '%s\n' "${SERVER_DOTENV}" >"${stage_dir}/apps/server/.env"
          chmod 0600 "${stage_dir}/apps/server/.env"
          chmod 0755 "${stage_dir}/deploy.sh"
          echo "path=${stage_dir}" >>"${GITHUB_OUTPUT}"

      - name: Ubuntu staging 전송
        run: |
          target="${SERVER_USER}@${SERVER_HOST}"
          remote_root="/home/ubuntu/jbnu-sugang-helper"
          remote_stage="${remote_root}/.staging/${IMAGE_TAG}"
          ssh -o BatchMode=yes "${target}" \
            "mkdir -p '${remote_root}' '${remote_stage}' && chmod 0750 '${remote_root}' '${remote_stage}'"
          scp -r "${{ steps.stage.outputs.path }}/." "${target}:${remote_stage}/"
          ssh -o BatchMode=yes "${target}" \
            "install -m 0755 '${remote_stage}/deploy.sh' '${remote_root}/deploy.sh'"

      - name: Ubuntu 배포
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          target="${SERVER_USER}@${SERVER_HOST}"
          remote_root="/home/ubuntu/jbnu-sugang-helper"
          remote_stage="${remote_root}/.staging/${IMAGE_TAG}"
          printf '%s' "${GITHUB_TOKEN}" | ssh -o BatchMode=yes "${target}" \
            "set -eu; trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT; \
            docker login ghcr.io --username github-actions --password-stdin; \
            '${remote_root}/deploy.sh' '${IMAGE_TAG}' '${remote_stage}'"
