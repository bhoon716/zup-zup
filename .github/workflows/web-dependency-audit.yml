name: Web dependency audit

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-web:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: 잠금 의존성 설치
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: 프로덕션 의존성 보안 감사
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=high --legacy-peer-deps

      - name: 프로덕션 의존성 업데이트 보고
        working-directory: apps/web
        run: npm outdated --omit=dev --legacy-peer-deps || true
