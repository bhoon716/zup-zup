spring:
  application:
    name: zup-zup

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    # DDL credentials remain in the one-shot Compose migrator, never in the runtime JVM.
    enabled: false
    baseline-on-migrate: true
    baseline-version: 3

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  h2:
    console:
      enabled: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile,email
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            authorization-grant-type: authorization_code

  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      ses:
        enabled: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

  mail:
    from: no-reply@zup-zup.com
    from-name: 줍줍
    properties:
      mail:
        smtp:
          connectiontimeout: ${SPRING_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
          timeout: ${SPRING_MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${SPRING_MAIL_SMTP_WRITETIMEOUT:5000}

server:
  shutdown: graceful
  servlet:
    session:
      timeout: 2h

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

jwt:
  secret: ${JWT_SECRET}
  access:
    expiration: 7200000
  refresh:
    expiration: 1209600000

app:
  auth:
    refresh-cookie-secure: true
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
    require-https: true
  oauth2:
    success-redirect-uri: ${APP_OAUTH2_SUCCESS_REDIRECT_URI}
    failure-redirect-uri: ${APP_OAUTH2_FAILURE_REDIRECT_URI}
    authorized-redirect-uri: ${APP_OAUTH2_AUTHORIZED_REDIRECT_URI}
  subscription:
    max-limit: 10
  admin-audit:
    fingerprint-secret: "${APP_ADMIN_AUDIT_FINGERPRINT_SECRET:${JWT_SECRET}}"
    retention-days: ${APP_ADMIN_AUDIT_RETENTION_DAYS:180}
    retention-cron: "${APP_ADMIN_AUDIT_RETENTION_CRON:0 15 3 * * *}"
  notification:
    provider:
      timeout-ms: ${APP_NOTIFICATION_PROVIDER_TIMEOUT_MS:5000}
      connect-timeout-ms: ${APP_NOTIFICATION_PROVIDER_CONNECT_TIMEOUT_MS:2000}
      read-timeout-ms: ${APP_NOTIFICATION_PROVIDER_READ_TIMEOUT_MS:5000}
      write-timeout-ms: ${APP_NOTIFICATION_PROVIDER_WRITE_TIMEOUT_MS:5000}
      circuit:
        failure-threshold: ${APP_NOTIFICATION_PROVIDER_CIRCUIT_FAILURE_THRESHOLD:3}
        open-seconds: ${APP_NOTIFICATION_PROVIDER_CIRCUIT_OPEN_SECONDS:30}
    outbox:
      poll-ms: ${APP_NOTIFICATION_OUTBOX_POLL_MS:5000}
      worker-threads: ${APP_NOTIFICATION_OUTBOX_WORKER_THREADS:8}
      queue-capacity: ${APP_NOTIFICATION_OUTBOX_QUEUE_CAPACITY:32}
      batch-size: ${APP_NOTIFICATION_OUTBOX_BATCH_SIZE:50}
      max-attempts: ${APP_NOTIFICATION_OUTBOX_MAX_ATTEMPTS:5}
      lease-seconds: ${APP_NOTIFICATION_OUTBOX_LEASE_SECONDS:60}
      dlq-retention-days: ${APP_NOTIFICATION_OUTBOX_DLQ_RETENTION_DAYS:30}
      dlq-retention-cron: "${APP_NOTIFICATION_OUTBOX_DLQ_RETENTION_CRON:0 30 3 * * *}"
    channels:
      email: true
      discord: true
      webpush: true
      fcm: true

  firebase:
    config-path: ${FIREBASE_CONFIG_PATH}
  webpush:
    public-key: ${WEBPUSH_PUBLIC_KEY}
    private-key: ${WEBPUSH_PRIVATE_KEY}
    subject: ${WEBPUSH_SUBJECT}
  discord:
    bot-token: ${DISCORD_BOT_TOKEN}
    client-id: ${DISCORD_CLIENT_ID}
    client-secret: ${DISCORD_CLIENT_SECRET}
    redirect-uri: ${DISCORD_REDIRECT_URI}

jbnu:
  api:
    url: https://oasis.jbnu.ac.kr/uni/uni/cour/less/findLessSubjtTblInq.action
    timeout-ms: 180000
    max-response-bytes: 10485760
    max-retries: 3
    retry-wait-ms: 3000
  crawler:
    freshness-check-ms: ${JBNU_CRAWLER_FRESHNESS_CHECK_MS:60000}
    stale-threshold-minutes: ${JBNU_CRAWLER_STALE_THRESHOLD_MINUTES:15}
    run-on-startup: false
    cron: "0 * * * * ?"
    default-year: "2026"
    default-semester: "U211600010"

management:
  server:
    port: 8081
  endpoints:
    access:
      default: none
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      access: read-only
      show-details: never
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,redis
    prometheus:
      access: read-only
